# used to create the object
name: UR

physics_engine: ${..physics_engine}

# if given, will override the device setting in gym. 
env:
  numEnvs: ${resolve_default:1024,${...num_envs}}
  startPos: [1.0, 0.0, 0.0]
  startRot: [0.0, 0.0, 1.0, 0.0]

  # 在 UR 周围生成随机坐标
  minBound: [0.45, -0.3, 0.00]
  maxBound: [0.6,  0.3, 0.35]

  # 柜子初始位置
  cabinetStartPos: [0.2, 0.0, 0.0]

  # 移出偏移量
  extractOffset: [0.00, 0.00, 0.05]

  # 相机分辨率
  cameraWidth: 640
  cameraHeight: 480
  fov: 60.0

  cameraPos: [1.2, 1.2, 1.2]
  cameraTarget: [0.5, 0.0, 0.0]

  envSpacing: 1.5
  episodeLength: 128
  enableDebugVis: False

  clipObservations: 5.0
  clipActions: 5.0

  startPositionNoise: 0.2
  startRotationNoise: 0.0

  numProps: 9
  aggregateMode: 3

  actionScale: 7.5
  dofVelocityScale: 0.1
  distRewardScale: 2.0
  alignRewardScale: 20.0

  restrictedZoneRewardScale: -10.0

  rotRewardScale: 0.5
  aroundHandleRewardScale: 0.25
  openRewardScale: 7.5
  fingerDistRewardScale: 5.0

  actionPenaltyScale: 0.01

  asset:
    assetRoot: "../../assets"
    assetFileNameUR: "urdf/ur_description/urdf/ur5e_with_gripper.urdf"
    assetFileNameCabinet: "urdf/cabinet_model/urdf/cabinet.urdf"

  # set to True if you use camera sensors in the environment
  enableCameraSensors: True

sim:
  dt: 0.0166 # 1/60
  substeps: 1
  up_axis: "z"
  use_gpu_pipeline: ${eq:${...pipeline},"gpu"}
  gravity: [0.0, 0.0, -9.81]
  physx:
    num_threads: ${....num_threads}
    solver_type: ${....solver_type}
    use_gpu: ${contains:"cuda",${....sim_device}} # set to False to run on CPU
    num_position_iterations: 12
    num_velocity_iterations: 1
    contact_offset: 0.005
    rest_offset: 0.0
    bounce_threshold_velocity: 0.2
    max_depenetration_velocity: 10.0
    default_buffer_size_multiplier: 5.0
    max_gpu_contact_pairs: 1048576 # 1024*1024
    num_subscenes: ${....num_subscenes}
    contact_collection: 0 # 0: CC_NEVER (don't collect contact info), 1: CC_LAST_SUBSTEP (collect only contacts on last substep), 2: CC_ALL_SUBSTEPS (broken - do not use!)

task:
  randomize: False
